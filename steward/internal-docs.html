<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Document Database</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --accent: #ffcc00;
            --border: #333;
            --text-main: #ffffff;
            --text-muted: #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 15px; padding-top: 100px; }

        /* TOP NAVBAR */
        .top-navbar {
            position: fixed; top: 0; left: 0; right: 0; min-height: 75px;
            background: #1a1a1a; border-bottom: 2px solid var(--accent);
            display: flex; align-items: center; padding: 10px 20px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .header-title { font-size: 18px; font-weight: bold; letter-spacing: 0.5px; }
        
        .hamburger-btn {
            background: none; border: none; color: var(--accent); font-size: 28px; cursor: pointer; margin-right: 15px;
        }

        /* SEARCH BANNER */
        .search-banner {
            background: #161616; padding: 15px; border-radius: 8px; border: 1px solid var(--border);
            margin-bottom: 20px; display: flex; gap: 15px; align-items: center;
        }
        .search-input {
            flex: 1; height: 45px; background: #262626; border: 1px solid #444;
            color: white; border-radius: 6px; padding: 0 15px; font-size: 16px; outline: none;
        }
        .search-input:focus { border-color: var(--accent); }

        /* DATA TABLE */
        .table-wrapper {
            width: 100%; overflow-x: auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
        }
        .data-table { width: 100%; border-collapse: collapse; text-align: left; }
        .data-table th {
            background: #222; color: var(--accent); padding: 14px 16px; border-bottom: 2px solid var(--border);
            font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase;
        }
        .data-table td { padding: 14px 16px; border-bottom: 1px solid #2a2a2a; font-size: 14px; }
        .data-table tbody tr:hover { background: #262626; }
        
        /* TAG PILLS */
        .pill { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; border: 1px solid #555; display: inline-block; }
        .btn-view { background: var(--accent); color: #000; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 12px; }
        .btn-view:hover { background: #fff; }
    </style>
</head>
<body>

    <!-- TOP NAVBAR -->
    <div class="top-navbar">
        <button class="hamburger-btn">☰</button>
        <div>
            <div class="header-title">Internal Document Database</div>
        </div>
    </div>

    <!-- SEARCH CONTROL -->
    <div class="search-banner">
        <input type="text" id="db-search" class="search-input" onkeyup="filterDocs()" placeholder="Search form name, tags, or notes...">
    </div>

    <!-- DATABASE DISPLAY -->
    <div id="loading" style="text-align: center; padding: 40px; color: var(--text-muted); font-weight: bold;">
        ↻ Syncing with SharePoint File Cabinet...
    </div>

    <div class="table-wrapper" id="table-container" style="display: none;">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Form Name</th>
                    <th>Category Tag</th>
                    <th>Instructions / Notes</th>
                    <th style="text-align: center;">Action</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Dynamically populated rows go here -->
            </tbody>
        </table>
    </div>

    <script>
        // Use your existing Power Automate environment endpoint here
        const flowUrl = "YOUR_POWER_AUTOMATE_DOCS_FLOW_URL";
        const urlParams = new URLSearchParams(window.location.search);
        const stewardGUID = urlParams.get('steward');
        
        let localDB = [];

        function loadDatabase() {
            if (!stewardGUID) {
                document.getElementById('loading').innerText = "Security Halt: No verification token.";
                return;
            }

            fetch(flowUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ "stewardGuid": stewardGUID, "action": "load_documents" })
            })
            .then(res => res.json())
            .then(data => {
                localDB = data.documentList || [];
                document.getElementById('loading').style.display = 'none';
                document.getElementById('table-container').style.display = 'block';
                renderTable(localDB);
            }).catch(err => {
                document.getElementById('loading').innerText = "Failed to sync with SharePoint database.";
                console.error(err);
            });
        }

        function renderTable(dataArray) {
            const tbody = document.getElementById('table-body');
            let rowsHtml = '';

            dataArray.forEach(doc => {
                const title = doc.Title || 'Unnamed Document';
                const tag = doc.DocumentType || 'General';
                const notes = doc.Notes || 'No internal guidelines provided.';
                
                // Routes the link directly into your custom document.html viewer file we just built!
                const viewLink = `documents.html?steward=${stewardGUID}&file=${encodeURIComponent(doc.FileLink)}`;

                rowsHtml += `
                    <tr>
                        <td style="font-weight: bold; color: white;">${title}</td>
                        <td><span class="pill">${tag}</span></td>
                        <td style="color: var(--text-muted); max-width: 400px; white-space: normal;">${notes}</td>
                        <td style="text-align: center;"><a href="${viewLink}" class="btn-view">Open File</a></td>
                    </tr>
                `;
            });

            tbody.innerHTML = rowsHtml;
        }

        function filterDocs() {
            const query = document.getElementById('db-search').value.toLowerCase();
            const filtered = localDB.filter(item => {
                return (item.Title || '').toLowerCase().includes(query) || 
                       (item.DocumentType || '').toLowerCase().includes(query) ||
                       (item.Notes || '').toLowerCase().includes(query);
            });
            renderTable(filtered);
        }

        window.onload = loadDatabase;
    </script>
</body>
</html>
