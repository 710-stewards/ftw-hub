<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local 710 Steward Portal</title>
</head>
<body style="background-color: #121212; color: #ffffff; font-family: sans-serif; padding: 20px; margin: 0;">

    <div style="border-bottom: 2px solid #ffcc00; padding-bottom: 15px; margin-bottom: 20px;">
        <h1 style="font-size: 26px; margin: 0 0 5px 0; color: #ffffff;">Steward Verification Portal</h1>
        <div id="steward-info" style="font-size: 16px; color: #ffcc00; margin-bottom: 5px;">Loading steward details...</div>
        <div id="record-count" style="font-size: 14px; color: #aaaaaa; font-weight: bold;">Connecting to cloud...</div>
    </div>

    <div id="loading" style="font-size: 16px; color: #aaaaaa;">Loading pending grievances...</div>
    <div id="data-display" style="display:none;"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const stewardGUID = urlParams.get('steward');
        const flowUrl = "https://defaultb1b2f01d8fee4ceb9550ca64ce62b7.f8.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/29defda63e574badbccaac58a833e39f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=YbxLXTZZ9bwT6gCUpreD8ja423SE6Z0Eiy1BN1M73J8";

        function loadPending() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('data-display').style.display = 'none';

            if (!stewardGUID) {
                document.getElementById('loading').innerText = "Error: No Steward ID provided. Please use your official secure link.";
                document.getElementById('record-count').innerText = "🔴 Connection Failed";
                return;
            }

            fetch(flowUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ "stewardGuid": stewardGUID, "action": "load" })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                const display = document.getElementById('data-display');
                display.style.display = 'block';
                
                if (!data || data.length === 0) {
                    document.getElementById('steward-info').innerText = "Steward Dashboard";
                    document.getElementById('record-count').innerText = "🟢 Connected • 0 Pending Records";
                    display.innerHTML = `<h3>No pending grievances.</h3><p>You are completely caught up.</p>`;
                    return;
                }

                document.getElementById('steward-info').innerHTML = `Welcome, <b>Steward Portal</b>`;
                document.getElementById('record-count').innerText = `🟢 Connected • Found ${data.length} pending records`;

                let htmlContent = '';
                data.forEach((item, index) => {
                    const uniqueTitleId = item['Title'] || '';
                    const empName = item['FirstName'] ? (item['FirstName'] + ' ' + (item['LastName'] || '')) : 'Unknown Driver';
                    const empId = item['EmployeeID'] || 'N/A';
                    const violType = item['ViolationType'] || 'N/A';
                    const claimAmt = item['ViolationAmount'] || '0.00';
                    const claimHrs = item['ClaimHours'] || '0.00';
                    const docLink = item['PublicLink'] || '';
                    
                    // AI Match status logic to dictate border color
                    const isAiMatched = item['AIMatched'] === true || item['AIMatched'] === 'true' || item['AIMatched'] === 1;
                    const cardBorderColor = isAiMatched ? '#00ff88' : '#ff3333'; 
                    const statusText = isAiMatched ? '✓ AI Matched' : '⚠ AI Discrepancy';

                    htmlContent += `
                        <div style="background-color: #1e1e1e; border-left: 5px solid ${cardBorderColor}; padding: 16px; margin-bottom: 15px; border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.3);">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                <span style="font-weight: bold; font-size: 16px; color: #ffffff;">ID: ${uniqueTitleId}</span>
                                <span style="color: ${cardBorderColor}; background-color: #2a2a2a; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold;">${statusText}</span>
                            </div>
                            <p style="margin: 5px 0; font-size: 15px; color: #ffffff;"><b>Driver:</b> ${empName} (Emp ID: ${empId})</p>
                            <p style="margin: 5px 0; font-size: 14px; color: #cccccc;"><b>Violation Type:</b> ${violType}</p>
                            <p style="margin: 5px 0; font-size: 14px; color: #cccccc;"><b>Claimed Hours:</b> ${claimHrs} hrs</p>
                            <p style="margin: 5px 0; font-size: 14px; color: #cccccc;"><b>Claim Amount:</b> $${claimAmt}</p>
                            
                            <div style="margin-top: 15px; display: flex; gap: 10px;">
                                ${docLink ? `<a href="${docLink}" target="_blank" style="background-color: #333333; color: #ffffff; text-decoration: none; padding: 10px 15px; font-weight: bold; border-radius: 4px; font-size: 14px; border: 1px solid #444;">📄 View PDF</a>` : ''}
                                <button onclick="verifyGrievance('${uniqueTitleId}')" style="background-color: #ffcc00; color: #000000; border: none; padding: 10px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 14px;">
                                    ✓ Verify & Approve
                                </button>
                            </div>
                        </div>
                    `;
                });

                display.innerHTML = htmlContent;
            })
            .catch(error => {
                document.getElementById('loading').innerText = "Connection error. Cloud failed to respond.";
                document.getElementById('record-count').innerText = "🔴 Cloud Offline";
                console.error(error);
            });
        }

        function verifyGrievance(titleId) {
            if (!confirm("Are you sure you want to verify record " + titleId + "?")) return;

            fetch(flowUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    "action": "verify", 
                    "Title": titleId 
                })
            })
            .then(response => {
                if (response.ok) {
                    loadPending();
                } else {
                    alert("Failed to update the record on the server.");
                }
            })
            .catch(error => {
                alert("Network error trying to verify.");
                console.error(error);
            });
        }

        // Run on load
        loadPending();
    </script>
</body>
</html>
