<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steward Live Portal</title>
    <style>
        /* CORE CONFIGURATION */
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --accent: #ffcc00;
            --success: #00ff88;
            --danger: #ff3333;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { padding: 15px 20px; border-bottom: 2px solid var(--accent); background: var(--bg-panel); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .save-status { font-size: 13px; font-weight: bold; padding: 4px 10px; border-radius: 20px; background: #333; color: var(--text-muted); transition: background 0.3s, color 0.3s; }
        .save-status.dirty { background: #554400; color: var(--accent); }
        .save-status.saving { background: #004422; color: var(--success); }

        /* HAMBURGER MENU */
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; }
        .menu-btn:hover { color: var(--accent); }

        .settings-panel { background: #1a1a1a; border-bottom: 1px solid var(--border); max-height: 0; overflow: hidden; transition: max-height 0.3s ease; width: 100%; display: flex; flex-direction: column; z-index: 5; box-shadow: 0 10px 15px rgba(0,0,0,0.5); }
        .settings-panel.open { max-height: 300px; }
        .settings-content { padding: 20px; display: flex; flex-direction: column; gap: 12px; max-width: 600px; margin: 0 auto; width: 100%; }

        .filter-section-title { font-size: 12px; font-weight: bold; text-transform: uppercase; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 4px; }
        .steward-checkbox-grid { display: flex; flex-wrap: wrap; gap: 12px; padding: 5px 0; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-main); cursor: pointer; background: #262626; padding: 6px 12px; border-radius: 4px; border: 1px solid #444; }
        .checkbox-label input[type="checkbox"] { width: auto; accent-color: var(--accent); }

        /* APPLICATION HOUSING */
        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        .main-content { flex: 1; overflow-y: auto; padding: 20px; transition: margin-right 0.3s; }

        /* SPREADSHEET HEADER (Hidden on mobile cards by default) */
        .spreadsheet-header { display: none; }

        /* MOBILE CARD GRID LAYOUT */
        .record-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 20px; }
        @media (max-width: 500px) { .record-grid { grid-template-columns: 1fr; } }

        .record-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; transition: border 0.2s; }
        .record-card:hover { border-color: #555; }
        .record-card::before { content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 6px; border-radius: 0 4px 4px 0; }
        .record-card.ai-match::before { background-color: var(--success); }
        .record-card.ai-fail::before { background-color: var(--danger); }

        .record-card.ai-match .emp-label { color: var(--text-muted); }
        .record-card.ai-fail .emp-label { color: var(--danger); }
        .record-card.ai-fail input.emp-input { color: var(--danger); border-color: rgba(255,51,51,0.4); }

        .card-split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-wrapper { display: flex; flex-direction: column; }
        .input-label { font-size: 11px; text-transform: uppercase; font-weight: bold; color: var(--text-muted); margin-bottom: 4px; }
        
        input, select { background: #262626; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; font-size: 14px; width: 100%; height: 38px; }
        input:focus, select:focus { border-color: var(--accent); outline: none; }
        
        .sys-id-display-box { background: transparent; color: var(--text-muted); border: 1px dashed #444; padding: 10px; border-radius: 4px; font-size: 13px; font-family: monospace; font-weight: bold; width: 100%; height: 38px; display: flex; align-items: center; }

        input.emp-input { font-size: 18px; font-weight: bold; padding: 6px 8px; }
        input.emp-input.long-name { font-size: 13px; } 
        input.id-input { font-size: 14px; font-weight: bold; font-family: monospace; text-align: center; padding: 6px 4px; }

        /* 3D WORK FLOOR INTERACTION BUTTONS */
        .btn-3d { display: block; width: 100%; padding: 12px; border-radius: 4px; font-size: 14px; font-weight: bold; text-transform: uppercase; text-align: center; cursor: pointer; border: none; transition: transform 0.1s, box-shadow 0.1s; height: 42px; }
        .btn-deepdive { background: #3a3a3a; color: #ffffff; box-shadow: 0 4px 0 #222; }
        .btn-deepdive:active { transform: translateY(4px); box-shadow: 0 0px 0 #222; }
        .btn-approve { background: #2a5e35; color: var(--success); border: 1px solid var(--success); box-shadow: 0 4px 0 #15331c; }
        .btn-approve:active { transform: translateY(4px); box-shadow: 0 0px 0 #15331c; }

        /* EVIDENCE SLIDE PANEL DRAWER */
        .drawer { width: 450px; background: #1a1a1a; border-left: 1px solid var(--border); position: absolute; right: -450px; top: 0; bottom: 0; transition: right 0.3s ease; display: flex; flex-direction: column; z-index: 100; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .drawer.open { right: 0; }
        
        /* DRAG HANDLE */
        .drawer-handle { width: 8px; background: #333; cursor: col-resize; position: absolute; left: 0; top: 0; bottom: 0; z-index: 101; transition: background 0.2s; }
        .drawer-handle:hover, .drawer-handle:active { background: var(--accent); }

        .drawer-header { padding: 15px 15px 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #222; }
        .close-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .drawer-content { padding: 15px 15px 15px 25px; flex: 1; overflow-y: auto; }
        .pdf-frame { width: 100%; height: 450px; border: 1px solid var(--border); border-radius: 4px; background: #333; margin-top: 10px; }

        @media (max-width: 799px) { .drawer { width: 100% !important; right: -100%; } .drawer-handle { display: none; } }

        /* MOBILE LANDSCAPE OPTIMIZATION */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            body { display: block; overflow-y: auto; height: auto; }
            .app-container { display: block; overflow: visible; }
            .main-content { overflow: visible; padding-top: 10px; }
            .drawer { position: fixed; height: 100vh; }
        }

        /* HIGH-DENSITY WORKSTATION PC OVERRIDE (Spreadsheet Blueprint) */
        @media screen and (min-width: 1200px) {
            .main-content { padding: 0; }
            .spreadsheet-header { display: grid; grid-template-columns: 2.2fr 1fr 1.2fr 1.5fr 1fr 1.5fr 1.5fr 100px; gap: 8px; background: #161616; padding: 10px 20px; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 8; font-size: 11px; text-transform: uppercase; font-weight: bold; color: var(--accent); letter-spacing: 0.5px; }
            .record-grid { grid-template-columns: 1fr; gap: 0; }
            .record-card { flex-direction: row; display: grid; grid-template-columns: 2.2fr 1fr 1.2fr 1.5fr 1fr 1.5fr 1.5fr 100px; gap: 8px; padding: 6px 20px; border-radius: 0; border: none; border-bottom: 1px solid var(--border); box-shadow: none; align-items: center; }
            .record-card::before { top: 0; bottom: 0; width: 4px; border-radius: 0; }
            .record-card > div, .card-split-grid { display: contents !important; }
            .card-split-grid > div { display: contents !important; }
            .input-label { display: none !important; }
            input, select, .sys-id-display-box { height: 32px; padding: 4px 8px; font-size: 13px !important; text-align: left !important; background: #1c1c1c; border-color: #2b2b2b; }
            .sys-id-display-box { border-style: solid; font-size: 11px !important; }
            .btn-3d { height: 32px; padding: 0 10px; font-size: 11px; box-shadow: none; display: flex; align-items: center; justify-content: center; }
            .btn-deepdive { display: none !important; }
        }

        /* PRINT STYLES */
        @media print {
            body { background: white; color: black; height: auto; overflow: visible; }
            header, .settings-panel, .drawer, .btn-3d, .spreadsheet-header { display: none !important; }
            .main-content { padding: 0; overflow: visible; }
            .record-card { border: 1px solid #ccc; box-shadow: none; break-inside: avoid; background: white; margin-bottom: 10px; display: block !important; }
            input, select, .sys-id-display-box { background: transparent; color: black; border: 1px solid #ccc; }
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="menu-btn" onclick="toggleSettings()" title="Coverage Filters">☰</button>
            <div>
                <h1 style="font-size: 22px; line-height: 1.1;">Local 710 Steward Portal</h1>
                <span id="steward-info" style="color: var(--accent); font-size: 14px;">Initializing live stream...</span>
            </div>
        </div>
        <div id="save-indicator" class="save-status">✓ Connected to Cloud</div>
    </header>

    <div id="settings-panel" class="settings-panel">
        <div class="settings-content">
            <div class="filter-section-title">Operational Coverage Filter</div>
            <p style="font-size: 13px; color: var(--text-muted);">Toggle active team lists to display cross-coverage pending inputs.</p>
            <div class="steward-checkbox-grid" id="steward-checkbox-grid">
                <label class="checkbox-label"><input type="checkbox" checked disabled> Current User</label>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div class="main-content">
            <div id="loading" style="color: var(--text-muted); padding: 20px;">Parsing records...</div>
            
            <div class="spreadsheet-header">
                <div>Member Name</div>
                <div>Emp ID</div>
                <div>File Date</div>
                <div>Violation Type</div>
                <div>Claim Amt</div>
                <div>Violation Date</div>
                <div>Sys ID</div>
                <div style="text-align: center;">Actions</div>
            </div>

            <div id="data-display" class="record-grid"></div>
        </div>

        <div id="side-drawer" class="drawer">
            <div id="drawerHandle" class="drawer-handle"></div>
            <div class="drawer-header">
                <h3 id="drawer-title">Deep Dive Evidence</h3>
                <button class="close-btn" onclick="closeDrawer()">✕</button>
            </div>
            <div class="drawer-content" id="drawer-main-content"></div>
        </div>
    </div>

    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const stewardGUID = urlParams.get('steward');
    const flowUrl = "https://defaultb1b2f01d8fee4ceb9550ca64ce62b7.f8.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/29defda63e574badbccaac58a833e39f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=YbxLXTZZ9bwT6gCUpreD8ja423SE6Z0Eiy1BN1M73J8";

    // --- GLOBAL LAYOUT VARIABLES ---
    let fullDataCache = [];
    let masterSeniorityArray = []; 
    let violTypeOptionsHtml = '';
    let subViolOptionsHtml = '';
    let currentStewardName = 'Steward';
    let lastHiddenCardId = null;
    let undoTimeoutTimer = null;

    function toggleSettings() {
        document.getElementById('settings-panel').classList.toggle('open');
    }

    function loadPending() {
        if (!stewardGUID) {
            document.getElementById('loading').innerText = "Security Halt: No routing verification token provided.";
            return;
        }

        fetch(flowUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ "stewardGuid": stewardGUID, "action": "load" })
        })
        .then(response => response.json())
        .then(dataBundle => {
            document.getElementById('loading').style.display = 'none';
            
            fullDataCache = dataBundle.pendingGrievances || [];
            const dropdownOptions = dataBundle.dropdownOptions || [];
            masterSeniorityArray = dataBundle.seniorityList || [];
            currentStewardName = dataBundle.stewardName || 'Steward';
            
            // Clean out array brackets if Power Automate parsed it stringified raw
            if (currentStewardName.startsWith('[') && currentStewardName.endsWith(']')) {
                try {
                    const parsed = JSON.parse(currentStewardName);
                    currentStewardName = parsed[0] || 'Steward';
                } catch(e) {}
            }

            if (fullDataCache.length === 0) {
                document.getElementById('steward-info').innerText = `${currentStewardName} | 0 Assigned Records`;
                document.getElementById('data-display').innerHTML = '<div style="color: var(--text-muted); padding: 20px;">No pending records found.</div>';
                return;
            }
            
            // Clean display format for the operational layout top bar header
            document.getElementById('steward-info').innerText = `${currentStewardName} | ${fullDataCache.length} Assigned Records`;

            // --- BUILD MASTER ROSTER DATALIST ---
            let seniorityOptionsHtml = '';
            masterSeniorityArray.forEach(person => {
                const fName = person.FirstName || person['First Name'] || '';
                const lName = person.LastName || person['Last Name'] || '';
                const fullRosterName = `${fName} ${lName}`.trim();
                if (fullRosterName) {
                    seniorityOptionsHtml += `<option value="${fullRosterName}"></option>`;
                }
            });

            // --- BUILD DYNAMIC DROPDOWN OPTION LISTS ---
            const violationTypeRows = dropdownOptions.filter(opt => opt.Title === 'ViolationType');
            const subViolationRows = dropdownOptions.filter(opt => opt.Title === 'ViolationSubType');

            violTypeOptionsHtml = '';
            violationTypeRows.forEach(opt => {
                const val = opt.OptionValue || opt['OptionValue'] || opt.Value || '';
                if(val) {
                    violTypeOptionsHtml += `<option value="${val}">${val}</option>`;
                }
            });

            subViolOptionsHtml = '';
            subViolationRows.forEach(opt => {
                const val = opt.OptionValue || opt['OptionValue'] || opt.Value || '';
                if(val) {
                    subViolOptionsHtml += `<option value="${val}">${val}</option>`;
                }
            });

            let dataListsContainer = document.getElementById('global-datalists');
            if (!dataListsContainer) {
                dataListsContainer = document.createElement('div');
                dataListsContainer.id = 'global-datalists';
                dataListsContainer.style.display = 'none';
                document.body.appendChild(dataListsContainer);
            }
            dataListsContainer.innerHTML = `<datalist id="master-seniority-list">${seniorityOptionsHtml}</datalist>`;

            // --- BUILD DYNAMIC HAMBURGER FILTER GRID ---
            buildStewardFilters();

            // Fire up initial desktop/mobile view array map
            renderCards(fullDataCache);
        }).catch(err => {
            document.getElementById('loading').innerText = "Interface parsing failure. Check format mappings.";
            console.error(err);
        });
    }

    // Dynamic extraction logic to build cross-coverage options on the fly
    function buildStewardFilters() {
        const grid = document.getElementById('steward-checkbox-grid');
        const stewards = [...new Set(fullDataCache.map(item => item.StewardOfRecord || item['StewardOfRecord']).filter(Boolean))];
        
        if (stewards.length === 0) {
            grid.innerHTML = '<p style="font-size: 13px; color: var(--text-muted); padding: 5px;">No cross-coverage metadata records detected.</p>';
            return;
        }

        let html = '';
        stewards.forEach(steward => {
            html += `
                <label class="checkbox-label">
                    <input type="checkbox" class="steward-chk" value="${steward}" checked onchange="filterRecords()"> ${steward}
                </label>
            `;
        });
        grid.innerHTML = html;
    }

    function filterRecords() {
        const checkboxes = document.querySelectorAll('.steward-chk');
        const checkedStewards = Array.from(checkboxes).filter(chk => chk.checked).map(chk => chk.value);
        
        const filtered = fullDataCache.filter(item => {
            const st = item.StewardOfRecord || item['StewardOfRecord'] || '';
            return checkedStewards.includes(st);
        });
        
        renderCards(filtered);
        
        // Dynamic operational header update to prevent visual tracking confusion
        document.getElementById('steward-info').innerText = `${currentStewardName} | Showing ${filtered.length} of ${fullDataCache.length} Records`;
    }

    function renderCards(recordsList) {
        const displayContainer = document.getElementById('data-display');
        if (recordsList.length === 0) {
            displayContainer.innerHTML = '<div style="color: var(--text-muted); padding: 20px;">No records match your selected operational coverage filter settings.</div>';
            return;
        }

        let htmlContent = '';
        recordsList.forEach((item) => {
            const sysId = item['Title'] || '';
            let empId = (item['EmployeeID'] || '').toString().trim();
            const isAiMatched = item['AIMatched'] === true || item['AIMatched'] === 'true' || item['AIMatched'] === 1;
            let cardClass = isAiMatched ? 'ai-match' : 'ai-fail';
            
            let displayName = isAiMatched 
                ? `${item['FirstName'] || ''} ${item['LastName'] || ''}`.trim()
                : (item['RawOCRName'] || 'Unknown Driver').trim();

            const violType = item['ViolationType'] || '';
            const subType = item['ViolationSubType'] || '';
            const amt = item['ViolationAmount'] || '0.00';
            
            const fileDate = item['FileDate'] ? item['FileDate'].split('T')[0] : '';
            const violDate = item['ViolationDate'] ? item['ViolationDate'].split('T')[0] : '';

            let idAlertHtml = '';
            let nameAlertHtml = '';
            let idInputStyleOverride = '';
            let nameInputStyleOverride = '';

            const rosterMatch = masterSeniorityArray.find(person => {
                const fName = person.FirstName || person['First Name'] || '';
                const lName = person.LastName || person['Last Name'] || '';
                return `${fName} ${lName}`.trim().toLowerCase() === displayName.toLowerCase();
            });

            if (!isAiMatched) {
                if (displayName !== 'Unknown Driver') {
                    displayName = displayName + ' *'; 
                }
                nameAlertHtml = '<span class="name-error-banner" style="color: #ffcc00; font-size: 10px; font-weight: bold; display: block; margin-top: 4px; letter-spacing: 0.3px;">⚠️ RESELECT MEMBER</span>';
                nameInputStyleOverride = 'border-color: #ffcc00;';

                if (rosterMatch) {
                    const officialRosterId = (rosterMatch.Title || '').toString().trim();
                    if (empId !== officialRosterId) {
                        empId = ''; 
                        idAlertHtml = '<span class="id-error-banner" style="color: #ff3333; font-size: 10px; font-weight: bold; display: block; text-align: center; margin-top: 4px; letter-spacing: 0.3px;">⚠️ ID MISMATCH</span>';
                        idInputStyleOverride = 'border-color: #ff3333; background: #3a1a1a;';
                        cardClass = 'ai-fail'; 
                    }
                } else if (displayName !== 'Unknown Driver *') {
                    idAlertHtml = '<span class="id-error-banner" style="color: #ffcc00; font-size: 10px; font-weight: bold; display: block; text-align: center; margin-top: 4px; letter-spacing: 0.3px;">⚠️ NOT IN ROSTER</span>';
                    idInputStyleOverride = 'border-color: #ffcc00;';
                }
            }

            const nameLengthClass = displayName.length > 14 ? 'long-name' : '';

            htmlContent += `
                <div class="record-card ${cardClass}" id="card-${sysId}" onclick="openDrawer('${sysId}')">
                    <div style="display: flex; justify-content: space-between; align-items: flex-end; gap: 12px;" onclick="event.stopPropagation()">
                        <div class="input-wrapper" style="flex: 1; min-width: 0;">
                            <span class="input-label emp-label">Member Name</span>
                            <input type="text" class="emp-input ${nameLengthClass}" value="${displayName}" style="${nameInputStyleOverride}" list="master-seniority-list" oninput="handleRosterSelection('${sysId}', this)">
                            ${nameAlertHtml}
                        </div>
                        <div class="input-wrapper" style="width: 85px; flex-shrink: 0;">
                            <span class="input-label emp-label" style="text-align: center;">Emp ID</span>
                            <input type="text" class="id-input" value="${empId}" style="${idInputStyleOverride}" placeholder="-------" maxlength="7">
                            ${idAlertHtml}
                        </div>
                    </div>

                    <div class="card-split-grid" onclick="event.stopPropagation()">
                        <div style="display: flex; flex-direction: column; gap: 12px;">
                            <div class="input-wrapper">
                                <span class="input-label">File Date</span>
                                <input type="date" value="${fileDate}">
                            </div>
                            <div class="input-wrapper">
                                <span class="input-label">Violation Type</span>
                                <select class="violtype-select">
                                    <option value="${violType}" hidden>${violType || 'Select...'}</option>
                                    ${violTypeOptionsHtml || `
                                        <option value="Discharge">Discharge</option>
                                        <option value="Suspension">Suspension</option>
                                        <option value="Pay Claim">Pay Claim</option>
                                        <option value="Protest">Protest</option>
                                        <option value="Other">Other</option>
                                    `}
                                </select>
                            </div>
                            <div class="input-wrapper">
                                <span class="input-label">Claim Amt</span>
                                <input type="number" step="0.01" class="amt-input" value="${amt}">
                            </div>
                            <button class="btn-3d btn-deepdive" onclick="openDrawer('${sysId}')" style="margin-top: 5px;">Deep Dive</button>
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 12px;">
                            <div class="input-wrapper">
                                <span class="input-label">Violation Date</span>
                                <input type="date" value="${violDate}">
                            </div>
                            <div class="input-wrapper">
                                <span class="input-label">Sub Violation</span>
                                <select class="subviol-select" onchange="handleSubViolChange('${sysId}', this)">
                                    <option value="${subType}" hidden>${subType || 'Select...'}</option>
                                    ${subViolOptionsHtml}
                                    <option value="CUSTOM_OTHER">✍️ Type Custom...</option>
                                </select>
                                <input type="text" class="subviol-custom-input" style="display: none; margin-top: 8px; height: 38px;" placeholder="Type custom violation here...">
                            </div>
                            <div class="input-wrapper">
                                <span class="input-label">Sys ID</span>
                                <div class="sys-id-display-box">${sysId}</div>
                            </div>
                            <button class="btn-3d btn-approve" onclick="executeRowCommit('${sysId}')" style="margin-top: 5px;">Approve</button>
                        </div>
                    </div>
                </div>
            `;
        });

        displayContainer.innerHTML = htmlContent;
    }

    function handleRosterSelection(recordId, inputElem) {
        const typedName = inputElem.value.trim();
        const card = document.getElementById(`card-${recordId}`);
        if (!card) return;

        const idInput = card.querySelector('.id-input');
        const nameInput = card.querySelector('.emp-input');

        const match = masterSeniorityArray.find(person => {
            const fName = person.FirstName || person['First Name'] || '';
            const lName = person.LastName || person['Last Name'] || '';
            return `${fName} ${lName}`.trim().toLowerCase() === typedName.toLowerCase();
        });
        
        if (match) {
            idInput.value = match.Title || match['Title'] || '';
            idInput.style.cssText = ''; 
            nameInput.style.cssText = '';
            
            const idAlert = card.querySelector('.id-error-banner');
            if (idAlert) idAlert.remove();
            
            const nameAlert = card.querySelector('.name-error-banner');
            if (nameAlert) nameAlert.remove();
        } else {
            idInput.value = '';
        }
    }

    function handleSubViolChange(recordId, selectElem) {
        const card = document.getElementById(`card-${recordId}`);
        if (!card) return;
        const customInput = card.querySelector('.subviol-custom-input');
        
        if (selectElem.value === 'CUSTOM_OTHER') {
            customInput.style.display = 'block';
            customInput.value = '';
            customInput.focus();
        } else {
            customInput.style.display = 'none';
        }
    }

    function executeRowCommit(recordId) {
        const card = document.getElementById(`card-${recordId}`);
        let fullInputName = card.querySelector('.emp-input').value.trim();
        const updatedEmpId = card.querySelector('.id-input').value.trim();
        const updatedFileDate = card.querySelectorAll('input[type="date"]')[0].value;
        const updatedViolDate = card.querySelectorAll('input[type="date"]')[1].value;
        const updatedViolType = card.querySelector('.violtype-select').value;
        const updatedAmount = card.querySelector('.amt-input').value;

        if (!updatedEmpId) {
            alert("Approval Blocked: A valid Employee ID must be populated before verifying this record.");
            return;
        }

        if (fullInputName.endsWith('*')) {
            fullInputName = fullInputName.slice(0, -1).trim();
        }

        let updatedViolSubType = card.querySelector('.subviol-select').value;
        if (updatedViolSubType === 'CUSTOM_OTHER') {
            updatedViolSubType = card.querySelector('.subviol-custom-input').value.trim();
        }

        const nameParts = fullInputName.split(' ');
        const firstName = nameParts[0] || '';
        const lastName = nameParts.slice(1).join(' ') || '';

        const ind = document.getElementById('save-indicator');
        ind.innerText = "↻ Committing changes...";
        ind.className = "save-status saving";

        fetch(flowUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                "stewardGuid": stewardGUID,
                "action": "verify",
                "titleId": recordId,
                "FirstName": firstName,
                "LastName": lastName,
                "EmployeeID": updatedEmpId,
                "FileDate": updatedFileDate,
                "ViolationDate": updatedViolDate,
                "ViolationType": updatedViolType,
                "ViolationSubType": updatedViolSubType,
                "ViolationAmount": updatedAmount
            })
        })
        .then(res => {
            if (res.ok) {
                card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                card.style.opacity = '0';
                card.style.transform = 'scale(0.9)';
                
                setTimeout(() => { 
                    card.style.display = 'none'; 
                }, 300);

                ind.innerText = "✓ Action Complete";
                ind.className = "save-status";

                triggerUndoToast(recordId);
            } else {
                alert("Cloud sync failed. Check connection.");
            }
        });
    }

    function triggerUndoToast(recordId) {
        clearTimeout(undoTimeoutTimer);
        lastHiddenCardId = recordId;

        let toast = document.getElementById('undo-toast-banner');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'undo-toast-banner';
            toast.style.cssText = "position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #222; border: 1px solid var(--accent); padding: 12px 24px; border-radius: 8px; display: flex; align-items: center; gap: 20px; z-index: 9999; box-shadow: 0 8px 24px rgba(0,0,0,0.6); font-size: 14px; font-weight: bold;";
            document.body.appendChild(toast);
        }

        toast.innerHTML = `
            <span style="color: white; letter-spacing: 0.3px;">Record Verified</span>
            <button onclick="executeUndoAction()" style="background: transparent; border: none; color: var(--accent); font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 14px; padding: 4px 8px; transition: color 0.2s;">↩ Undo</button>
        `;
        toast.style.display = 'flex';

        undoTimeoutTimer = setTimeout(() => {
            toast.style.display = 'none';
            lastHiddenCardId = null;
        }, 5000);
    }

    function executeUndoAction() {
        if (!lastHiddenCardId) return;

        const card = document.getElementById(`card-${lastHiddenCardId}`);
        if (card) {
            card.style.display = 'flex';
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'scale(1)';
            }, 10);
        }

        const toast = document.getElementById('undo-toast-banner');
        if (toast) toast.style.display = 'none';
        
        clearTimeout(undoTimeoutTimer);
        lastHiddenCardId = null;
    }

    function openDrawer(recordId) {
        const record = fullDataCache.find(r => r.Title === recordId);
        document.getElementById('drawer-title').innerText = `Deep Dive: ${recordId}`;
        const drawerContent = document.getElementById('drawer-main-content');
        if (!record) {
            drawerContent.innerHTML = `<p style="color: var(--text-muted);">Record context dropped.</p>`;
            return;
        }
        let safeLink = record.PublicLink || '';
        let downloadBtnHtml = '';
        if (safeLink.includes("drive.google.com")) {
            const fileIdMatch = safeLink.match(/(?:id=|\/d\/)([\w-]+)/);
            if (fileIdMatch && fileIdMatch[1]) {
                const fileId = fileIdMatch[1];
                safeLink = `https://drive.google.com/file/d/${fileId}/preview`;
                downloadBtnHtml = `
                    <div style="text-align: center; margin-top: 12px;">
                        <a href="https://drive.google.com/uc?export=download&id=${fileId}" style="display: inline-block; background-color: #333; color: #ffcc00; padding: 10px 20px; font-size: 13px; font-weight: bold; border-radius: 4px; text-decoration: none; border: 1px solid #ffcc00;">
                            📥 Download PDF Copy </a>
                    </div>
                `;
            }
        }
        drawerContent.innerHTML = `
            <div style="margin-bottom: 20px; background: #222; padding: 12px; border-radius: 4px; border: 1px solid var(--border);">
                <h4 style="color: var(--accent); margin-bottom: 8px; font-size: 14px;">Master Metadata Context</h4>
                <p style="font-size: 13px; margin-bottom: 4px;"><b>Raw Extracted Name:</b> ${record.RawOCRName || 'N/A'}</p>
                <p style="font-size: 13px; margin-bottom: 4px;"><b>Claim Hours:</b> ${record.ClaimHours || '0.00'}</p>
                <p style="font-size: 13px; margin-bottom: 4px;"><b>Steward of Record:</b> ${record.StewardOfRecord || 'N/A'}</p>
                <p style="font-size: 13px;"><b>AI Operational Match:</b> ${record.AIMatched === true || record.AIMatched === 'true' ? 'Verified Match' : 'Discrepancy Detected'}</p>
            </div>
            <label style="font-size: 11px; color: var(--text-muted); font-weight: bold; text-transform: uppercase; margin-bottom: 4px; display: block;">Steward Internal Notes</label>
            <textarea rows="3" style="width: 100%; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 4px; padding: 10px; margin-bottom: 15px; resize: vertical;" placeholder="Type notes here..."></textarea>
            <label style="font-size: 11px; color: var(--text-muted); font-weight: bold; text-transform: uppercase; margin-bottom: 4px; display: block;">Evidence Document</label>
            ${safeLink ? `<iframe src="${safeLink}" class="pdf-frame" frameborder="0"></iframe>${downloadBtnHtml}` : `<div style="padding: 20px; text-align: center; color: var(--text-muted); border: 1px dashed var(--border); margin-top: 10px;">No document attached</div>`}
        `;
        document.getElementById('side-drawer').classList.add('open');
    }

    function closeDrawer() {
        document.getElementById('side-drawer').classList.remove('open');
    }

    const drawer = document.getElementById('side-drawer');
    const handle = document.getElementById('drawerHandle');
    handle.addEventListener('mousedown', initResize);
    handle.addEventListener('touchstart', initResize, { passive: true });

    function initResize(e) {
        document.addEventListener('mousemove', resizeDrawer);
        document.addEventListener('mouseup', stopResize);
        document.addEventListener('touchmove', resizeDrawer, { passive: false });
        document.addEventListener('touchend', stopResize);
    }

    function resizeDrawer(e) {
        let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        const newWidth = window.innerWidth - clientX;
        if (newWidth > window.innerWidth * 0.3 && newWidth < window.innerWidth * 0.8) {
            drawer.style.width = newWidth + 'px';
        }
    }

    function stopResize() {
        document.removeEventListener('mousemove', resizeDrawer);
        document.removeEventListener('touchmove', resizeDrawer);
    }

    loadPending();

    </script>
    </body>
</html>
