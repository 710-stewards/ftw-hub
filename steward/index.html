<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steward Live Portal</title>
    <style>
        /* CORE SETUP */
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --accent: #ffcc00;
            --success: #00ff88;
            --danger: #ff3333;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding: 20px; overflow-y: auto; }

        header { padding: 15px 0; border-bottom: 2px solid var(--accent); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .save-status { font-size: 13px; font-weight: bold; padding: 4px 10px; border-radius: 20px; background: #333; color: var(--text-muted); }

        /* RECORD GRID */
        .record-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 20px; }
        
        @media (max-width: 500px) {
            .record-grid { grid-template-columns: 1fr; }
        }

        /* CARD STYLE MATCHING SKETCH 1000027581.JPG */
        .record-card { 
            background: var(--bg-panel); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 20px; 
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Thick Left-Side Arc Border Line from Sketch */
        .record-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10px;
            bottom: 10px;
            width: 6px;
            border-radius: 0 4px 4px 0;
        }
        .record-card.ai-match::before { background-color: var(--success); }
        .record-card.ai-fail::before { background-color: var(--danger); }

        /* Dynamic Name and ID text color rules */
        .record-card.ai-match .emp-name-text { color: #ffffff; }
        .record-card.ai-match .emp-id-text { color: var(--text-muted); }
        .record-card.ai-fail .emp-name-text { color: var(--danger); }
        .record-card.ai-fail .emp-id-text { color: var(--danger); }

        /* Split layout grid for inputs matching your drawing columns */
        .card-split-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Forms and Inputs */
        .input-wrapper { display: flex; flex-direction: column; }
        .input-label { font-size: 11px; text-transform: uppercase; font-weight: bold; color: var(--text-muted); margin-bottom: 4px; }
        input, select { background: #262626; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; font-size: 14px; width: 100%; }
        input:focus, select:focus { border-color: var(--accent); outline: none; }

        /* 3D Button Styling matching your drawing sketches */
        .btn-3d {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
            border: none;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-deepdive {
            background: #3a3a3a;
            color: #ffffff;
            box-shadow: 0 4px 0 #222;
        }
        .btn-deepdive:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #222;
        }
        .btn-approve {
            background: #2a5e35;
            color: var(--success);
            border: 1px solid var(--success);
            box-shadow: 0 4px 0 #15331c;
        }
        .btn-approve:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #15331c;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="font-size: 22px;">Local 710 Steward Portal</h1>
            <span id="steward-info" style="color: var(--accent); font-size: 14px;">Loading...</span>
        </div>
        <div id="save-indicator" class="save-status">✓ All changes saved</div>
    </header>

    <div id="loading" style="color: var(--text-muted);">Parsing records...</div>
    <div id="data-display" class="record-grid"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const stewardGUID = urlParams.get('steward');
        const flowUrl = "https://defaultb1b2f01d8fee4ceb9550ca64ce62b7.f8.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/29defda63e574badbccaac58a833e39f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=YbxLXTZZ9bwT6gCUpreD8ja423SE6Z0Eiy1BN1M73J8";

        let fullDataCache = [];

        function loadPending() {
            if (!stewardGUID) {
                document.getElementById('loading').innerText = "Missing routing parameter.";
                return;
            }

            fetch(flowUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ "stewardGuid": stewardGUID, "action": "load" })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                fullDataCache = data;
                
                if (!data || data.length === 0) {
                    document.getElementById('steward-info').innerText = "0 Assigned Records";
                    return;
                }
                document.getElementById('steward-info').innerText = `${data.length} records assigned`;

                let htmlContent = '';
                data.forEach((item) => {
                    const sysId = item['Title'] || '';
                    const empId = item['EmployeeID'] || '------';
                    const isAiMatched = item['AIMatched'] === true || item['AIMatched'] === 'true' || item['AIMatched'] === 1;
                    const cardClass = isAiMatched ? 'ai-match' : 'ai-fail';
                    
                    // Core Name Selector Logic
                    const displayName = isAiMatched 
                        ? `${item['FirstName'] || ''} ${item['LastName'] || ''}`.trim()
                        : item['RawOCRName'] || 'Unknown Driver';

                    const violType = item['ViolationType'] || '';
                    const subType = item['ViolationSubType'] || '';
                    const amt = item['ViolationAmount'] || '0.00';
                    
                    // Raw string dates passed directly to clean inputs
                    const fileDate = item['FileDate'] ? item['FileDate'].split('T')[0] : '';
                    const violDate = item['ViolationDate'] ? item['ViolationDate'].split('T')[0] : '';

                    htmlContent += `
                        <div class="record-card ${cardClass}" id="card-${sysId}">
                            
                            <!-- TOP row header matching sketch elements -->
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; padding-left: 5px;">
                                <div class="emp-name-text" style="font-size: 22px; font-weight: 900; letter-spacing: -0.5px; line-height: 1.1;">
                                    ${displayName}
                                </div>
                                <div style="text-align: right; min-width: 100px;">
                                    <div style="font-size: 10px; text-transform: uppercase; color: var(--text-muted); font-weight: bold;">Emp ID</div>
                                    <div class="emp-id-text" style="font-size: 15px; font-weight: bold; font-family: monospace;">${empId}</div>
                                </div>
                            </div>

                            <!-- TWO COLUMN GRID COPIED DIRECTLY FROM DRAWING -->
                            <div class="card-split-grid" style="padding-left: 5px;">
                                
                                <!-- LEFT COLUMN -->
                                <div style="display: flex; flex-direction: column; gap: 12px;">
                                    <div class="input-wrapper">
                                        <span class="input-label">File Date</span>
                                        <input type="date" value="${fileDate}">
                                    </div>
                                    <div class="input-wrapper">
                                        <span class="input-label">Violation Type</span>
                                        <select>
                                            <option value="${violType}" hidden>${violType || 'Select...'}</option>
                                            <option value="Discharge">Discharge</option>
                                            <option value="Suspension">Suspension</option>
                                            <option value="Pay Claim">Pay Claim</option>
                                            <option value="Protest">Protest</option>
                                            <option value="Other">Other</option>
                                        </select>
                                    </div>
                                    <div class="input-wrapper">
                                        <span class="input-label">Claim Amt</span>
                                        <input type="number" step="0.01" value="${amt}">
                                    </div>
                                    <button class="btn-3d btn-deepdive" style="margin-top: 5px;">Deep Dive</button>
                                </div>

                                <!-- RIGHT COLUMN -->
                                <div style="display: flex; flex-direction: column; gap: 12px;">
                                    <div class="input-wrapper">
                                        <span class="input-label">Violation Date</span>
                                        <input type="date" value="${violDate}">
                                    </div>
                                    <div class="input-wrapper">
                                        <span class="input-label">Sub Violation</span>
                                        <select>
                                            <option value="${subType}" hidden>${subType || 'Select...'}</option>
                                        </select>
                                    </div>
                                    <div class="input-wrapper" style="height: 43px; justify-content: center;">
                                        <span class="input-label" style="margin-bottom: 2px;">Sys ID</span>
                                        <span style="font-size: 13px; font-family: monospace; color: var(--text-muted); font-weight: bold;">${sysId}</span>
                                    </div>
                                    <button class="btn-3d btn-approve" style="margin-top: 22px;">Approve</button>
                                </div>

                            </div>
                        </div>
                    `;
                });

                document.getElementById('data-display').innerHTML = htmlContent;
            });
        }

        loadPending();
    </script>
</body>
</html>
